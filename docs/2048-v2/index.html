<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>2048 Game</title>
  <style>
    :root {
      --bg: #faf8ef;
      --panel: #bbada0;
      --cell: rgba(238, 228, 218, 0.35);
      --text: #776e65;
      --light: #f9f6f2;
      --shadow: rgba(0, 0, 0, 0.12);
      --surface-top: #fff8e8;
      --surface-mid: #faf8ef;
      --surface-bottom: #f3efe3;
      --button: #8f7a66;
      --tile-2: #eee4da;
      --tile-4: #ede0c8;
      --tile-8: #f2b179;
      --tile-16: #f59563;
      --tile-32: #f67c5f;
      --tile-64: #f65e3b;
      --tile-128: #edcf72;
      --tile-256: #edcc61;
      --tile-512: #edc850;
      --tile-1024: #edc53f;
      --tile-2048: #edc22e;
      --tile-4096: #3c3a32;
      --tile-8192: #3c3a32;
    }

    body[data-theme="sunset"] {
      --bg: #fff4f0;
      --panel: #d08c7f;
      --cell: rgba(255, 243, 238, 0.35);
      --text: #6b3f3b;
      --light: #fff8f6;
      --surface-top: #ffe2d7;
      --surface-mid: #fff3ea;
      --surface-bottom: #ffd9c8;
      --button: #b85c50;
      --tile-2: #ffe1d6;
      --tile-4: #ffd0c0;
      --tile-8: #ffae7a;
      --tile-16: #ff8b6b;
      --tile-32: #f56c6c;
      --tile-64: #dd4f5f;
      --tile-128: #ffc86b;
      --tile-256: #ffbb5c;
      --tile-512: #ffa94d;
      --tile-1024: #ff944d;
      --tile-2048: #ff7d5c;
      --tile-4096: #663b3b;
      --tile-8192: #4f2f35;
    }

    body[data-theme="mint"] {
      --bg: #f2fffb;
      --panel: #86b6ad;
      --cell: rgba(239, 255, 251, 0.35);
      --text: #365753;
      --light: #f7fffd;
      --surface-top: #defdf4;
      --surface-mid: #f2fffb;
      --surface-bottom: #d3f2ea;
      --button: #4f8f83;
      --tile-2: #daf7f0;
      --tile-4: #c9f0e6;
      --tile-8: #7bd6c3;
      --tile-16: #56c2b4;
      --tile-32: #3baea0;
      --tile-64: #2f8f83;
      --tile-128: #cce96b;
      --tile-256: #b8dd58;
      --tile-512: #9dd14f;
      --tile-1024: #7fbe4a;
      --tile-2048: #5ea94b;
      --tile-4096: #294b49;
      --tile-8192: #1e3938;
    }

    body[data-theme="lime"] {
      --bg: #f5fbef;
      --panel: #9eb787;
      --cell: rgba(245, 251, 239, 0.45);
      --text: #425638;
      --light: #fbfff8;
      --surface-top: #edf8e2;
      --surface-mid: #f5fbef;
      --surface-bottom: #dceacc;
      --button: #6f9960;
      --tile-2: #eaf4df;
      --tile-4: #ddeccc;
      --tile-8: #b9d89c;
      --tile-16: #a3ca84;
      --tile-32: #8cbc6f;
      --tile-64: #76ad5f;
      --tile-128: #d1dfa7;
      --tile-256: #bfd58f;
      --tile-512: #aacb79;
      --tile-1024: #90bc67;
      --tile-2048: #76ab58;
      --tile-4096: #53694b;
      --tile-8192: #44573d;
    }

    body[data-theme="midnight"] {
      --bg: #151826;
      --panel: #2a324a;
      --cell: rgba(255, 255, 255, 0.07);
      --text: #d8e1ff;
      --light: #f7f9ff;
      --shadow: rgba(0, 0, 0, 0.35);
      --surface-top: #1e2340;
      --surface-mid: #151826;
      --surface-bottom: #10131e;
      --button: #5d74d6;
      --tile-2: #2d3654;
      --tile-4: #3a476d;
      --tile-8: #4f67d7;
      --tile-16: #6b7ff0;
      --tile-32: #8f72ff;
      --tile-64: #a15cff;
      --tile-128: #3bb7d9;
      --tile-256: #19a7ce;
      --tile-512: #00c2a8;
      --tile-1024: #3ad29f;
      --tile-2048: #7de36f;
      --tile-4096: #e5b8ff;
      --tile-8192: #ffc8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, var(--surface-top) 0%, var(--surface-mid) 55%, var(--surface-bottom) 100%);
      color: var(--text);
    }

    .app {
      width: min(92vw, 520px);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(52px, 10vw, 76px);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 15px;
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: stretch;
      min-width: 140px;
    }

    .scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .score-box {
      background: var(--panel);
      color: var(--light);
      border-radius: 14px;
      padding: 10px 12px;
      text-align: center;
      box-shadow: 0 10px 24px -18px var(--shadow);
    }

    .score-box span {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      opacity: 0.85;
    }

    .score-box strong {
      display: block;
      margin-top: 6px;
      font-size: 26px;
      line-height: 1;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      background: var(--button);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px -18px var(--shadow);
      transition: transform 120ms ease, opacity 120ms ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .board-wrap {
      position: relative;
      margin-top: 10px;
    }

    .theme-picker {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 10px 24px -18px var(--shadow);
      outline: none;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 12px;
      background: var(--panel);
      border-radius: 22px;
      box-shadow: 0 20px 50px -30px rgba(0, 0, 0, 0.35);
      touch-action: none;
      user-select: none;
    }

    .cell {
      aspect-ratio: 1;
      border-radius: 16px;
      background: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: clamp(28px, 7vw, 42px);
      transition: background-color 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .cell.is-new {
      animation: tile-pop 180ms ease-out;
    }

    .cell.is-merged {
      animation: tile-merge 220ms ease-out;
    }

    .cell.is-hidden {
      opacity: 0;
    }

    .cell[data-value="0"] {
      color: transparent;
    }

    .cell[data-value="2"] { background: var(--tile-2); color: var(--text); }
    .cell[data-value="4"] { background: var(--tile-4); color: var(--text); }
    .cell[data-value="8"] { background: var(--tile-8); color: var(--light); }
    .cell[data-value="16"] { background: var(--tile-16); color: var(--light); }
    .cell[data-value="32"] { background: var(--tile-32); color: var(--light); }
    .cell[data-value="64"] { background: var(--tile-64); color: var(--light); }
    .cell[data-value="128"] { background: var(--tile-128); color: var(--light); font-size: clamp(24px, 6vw, 36px); }
    .cell[data-value="256"] { background: var(--tile-256); color: var(--light); font-size: clamp(24px, 6vw, 36px); }
    .cell[data-value="512"] { background: var(--tile-512); color: var(--light); font-size: clamp(24px, 6vw, 36px); }
    .cell[data-value="1024"] { background: var(--tile-1024); color: var(--light); font-size: clamp(20px, 5vw, 30px); }
    .cell[data-value="2048"] { background: var(--tile-2048); color: var(--light); font-size: clamp(20px, 5vw, 30px); }
    .cell[data-value="4096"],
    .cell[data-value="8192"] {
      color: var(--light);
      font-size: clamp(18px, 4.8vw, 28px);
    }
    .cell[data-value="4096"] { background: var(--tile-4096); }
    .cell[data-value="8192"] { background: var(--tile-8192); }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      border-radius: 22px;
      background: rgba(250, 248, 239, 0.85);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .motion-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .motion-tile {
      position: absolute;
      margin: 0;
      transition: transform 150ms ease-in-out;
      box-shadow: 0 12px 20px -16px rgba(0, 0, 0, 0.35);
      will-change: transform;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .message-box h2 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    .message-box p {
      margin: 0 0 18px;
      line-height: 1.5;
    }

    .overlay-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
      min-width: min(100%, 280px);
    }

    .overlay-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .overlay-save {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .overlay-save.show {
      display: flex;
    }

    .overlay-name-input {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      outline: none;
    }

    .overlay-status {
      margin: 0;
      min-height: 20px;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.85;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
      opacity: 0.78;
    }

    .ranking-panel {
      margin-top: 12px;
      padding: 14px 14px 12px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 20px 40px -30px var(--shadow);
    }

    .ranking-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .ranking-title {
      margin: 0;
      font-size: 20px;
      line-height: 1;
    }

    .ranking-button {
      padding: 11px 14px;
      font-size: 14px;
    }

    .ranking-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .name-input {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.82);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.06);
      outline: none;
    }

    .ranking-status {
      margin: 8px 0 0;
      font-size: 12px;
      line-height: 1.35;
      opacity: 0.8;
    }

    .leaderboard {
      margin: 10px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 166px;
      overflow: auto;
    }

    .leaderboard li {
      font-size: 14px;
      line-height: 1.3;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .leaderboard-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-score {
      flex-shrink: 0;
      opacity: 0.86;
    }

    @keyframes tile-pop {
      0% {
        opacity: 0;
        transform: scale(0.55);
      }

      70% {
        opacity: 1;
        transform: scale(1.08);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes tile-merge {
      0% {
        transform: scale(0.9);
      }

      55% {
        transform: scale(1.16);
      }

      100% {
        transform: scale(1);
      }
    }

    @media (max-width: 560px) {
      .header {
        flex-direction: column;
      }

      .controls {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <div>
        <h1 class="title">2048</h1>
        <p class="subtitle">Join the tiles and make the 2048 tile.</p>
      </div>
      <div class="controls">
        <div class="scores">
          <div class="score-box">
            <span>SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div class="score-box">
            <span>BEST</span>
            <strong id="best">0</strong>
          </div>
          <div class="score-box">
            <span>TIME</span>
            <strong id="time-played">0s</strong>
          </div>
          <div class="score-box">
            <span>TURN</span>
            <strong id="turn-time">0s</strong>
          </div>
        </div>
        <select id="theme-select" class="theme-picker" aria-label="Choose color theme">
          <option value="classic">Classic</option>
          <option value="sunset">Sunset</option>
          <option value="mint">Mint</option>
          <option value="lime">Lime</option>
          <option value="midnight">Midnight</option>
        </select>
        <button id="restart" type="button">New Game</button>
      </div>
    </section>

    <section class="board-wrap">
      <div class="board" id="board" aria-label="2048 game board"></div>
      <div class="motion-layer" id="motion-layer" aria-hidden="true"></div>
      <div class="overlay" id="overlay">
        <div class="message-box">
          <h2 id="message-title"></h2>
          <p id="message-text"></p>
          <div id="overlay-save" class="overlay-save">
            <input id="overlay-player-name" class="overlay-name-input" type="text" maxlength="16" placeholder="Enter your ranking name">
            <p id="overlay-ranking-status" class="overlay-status"></p>
          </div>
          <div class="overlay-actions">
            <div class="overlay-row">
              <button id="retry" type="button">Play Again</button>
              <button id="overlay-save-score" class="ranking-button" type="button">Save Score</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <p class="hint">Use arrow keys on desktop or swipe on mobile.</p>

    <section class="ranking-panel">
      <div class="ranking-head">
        <h2 class="ranking-title">Online Ranking</h2>
      </div>
      <p id="ranking-status" class="ranking-status">Online ranking is not connected yet.</p>
      <ul id="leaderboard" class="leaderboard"></ul>
    </section>
  </main>

  <script>
    window.__RANKING_API_BASE__ = "https://weekly-sp-ranking.songsiyoon.workers.dev";
  </script>
  <script>
    const size = 4;
    const boardElement = document.getElementById("board");
    const scoreElement = document.getElementById("score");
    const bestElement = document.getElementById("best");
    const timePlayedElement = document.getElementById("time-played");
    const turnTimeElement = document.getElementById("turn-time");
    const overlayElement = document.getElementById("overlay");
    const motionLayerElement = document.getElementById("motion-layer");
    const messageTitleElement = document.getElementById("message-title");
    const messageTextElement = document.getElementById("message-text");
    const restartButton = document.getElementById("restart");
    const retryButton = document.getElementById("retry");
    const themeSelect = document.getElementById("theme-select");
    const overlaySaveWrap = document.getElementById("overlay-save");
    const overlayPlayerNameInput = document.getElementById("overlay-player-name");
    const overlayRankingStatusElement = document.getElementById("overlay-ranking-status");
    const overlaySaveScoreButton = document.getElementById("overlay-save-score");
    const rankingStatusElement = document.getElementById("ranking-status");
    const leaderboardElement = document.getElementById("leaderboard");
    const animationDuration = 150;
    const themeStorageKey = "2048-theme";
    const soundStorageKey = "2048-sound-enabled";
    const playerNameStorageKey = "2048-player-name";
    const rankingApiBase = window.__RANKING_API_BASE__ || "";

    let board = [];
    let score = 0;
    let best = Number(localStorage.getItem("best-2048-score") || 0);
    let hasWon = false;
    let touchStartX = 0;
    let touchStartY = 0;
    let spawnedTiles = new Set();
    let mergedTiles = new Set();
    let settlingTiles = new Set();
    let isAnimating = false;
    let soundEnabled = true;
    let bgmEnabled = true;
    let audioContext = null;
    let bgmLoopId = null;
    let bgmStep = 0;
    let clockIntervalId = null;
    let gameStartTime = Date.now();
    let turnStartTime = Date.now();
    let gameFinished = false;
    function init() {
      bestElement.textContent = best;
      loadTheme();
      loadSoundPreference();
      initRanking();
      startGame();
      bindEvents();
      startClock();
      attemptAutoplayBgm();
    }

    function startGame() {
      board = Array.from({ length: size }, () => Array(size).fill(0));
      score = 0;
      hasWon = false;
      spawnedTiles = new Set();
      mergedTiles = new Set();
      settlingTiles = new Set();
      isAnimating = false;
      gameFinished = false;
      motionLayerElement.innerHTML = "";
      gameStartTime = Date.now();
      turnStartTime = Date.now();
      addRandomTile();
      addRandomTile();
      hideMessage();
      render();
      updateSaveButtonState();
    }

    function bindEvents() {
      window.addEventListener("keydown", handleKeyDown);
      restartButton.addEventListener("click", startGame);
      retryButton.addEventListener("click", startGame);
      themeSelect.addEventListener("change", (event) => applyTheme(event.target.value));
      overlaySaveScoreButton.addEventListener("click", saveScore);
      overlayPlayerNameInput.addEventListener("input", handlePlayerNameInput);
      window.addEventListener("pointerdown", attemptAutoplayBgm, { passive: true });
      window.addEventListener("load", attemptAutoplayBgm, { once: true });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          attemptAutoplayBgm();
        }
      });

      boardElement.addEventListener("touchstart", (event) => {
        ensureAudioReady();
        startBgm();
        const touch = event.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      boardElement.addEventListener("touchend", (event) => {
        const touch = event.changedTouches[0];
        const deltaX = touch.clientX - touchStartX;
        const deltaY = touch.clientY - touchStartY;
        const threshold = 30;

        if (Math.abs(deltaX) < threshold && Math.abs(deltaY) < threshold) {
          return;
        }

        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          move(deltaX > 0 ? "right" : "left");
        } else {
          move(deltaY > 0 ? "down" : "up");
        }
      }, { passive: true });
    }

    function handleKeyDown(event) {
      ensureAudioReady();
      startBgm();
      const keyMap = {
        ArrowUp: "up",
        ArrowDown: "down",
        ArrowLeft: "left",
        ArrowRight: "right"
      };

      const direction = keyMap[event.key];
      if (!direction || isAnimating) {
        return;
      }

      event.preventDefault();
      move(direction);
    }

    function render() {
      boardElement.innerHTML = "";

      for (let rowIndex = 0; rowIndex < size; rowIndex += 1) {
        for (let colIndex = 0; colIndex < size; colIndex += 1) {
          const value = board[rowIndex][colIndex];
          const key = getCellKey(rowIndex, colIndex);
          const cell = document.createElement("div");
          cell.className = "cell";

          if (spawnedTiles.has(key)) {
            cell.classList.add("is-new");
          }

          if (mergedTiles.has(key)) {
            cell.classList.add("is-merged");
          }

          if (settlingTiles.has(key)) {
            cell.classList.add("is-hidden");
          }

          cell.dataset.value = String(value);
          cell.textContent = value === 0 ? "" : value;
          boardElement.appendChild(cell);
        }
      }

      scoreElement.textContent = score;
      bestElement.textContent = best;
      renderTimers();
    }

    function addRandomTile() {
      const emptyCells = [];

      for (let row = 0; row < size; row += 1) {
        for (let col = 0; col < size; col += 1) {
          if (board[row][col] === 0) {
            emptyCells.push([row, col]);
          }
        }
      }

      if (emptyCells.length === 0) {
        return;
      }

      const [row, col] = emptyCells[Math.floor(Math.random() * emptyCells.length)];
      board[row][col] = Math.random() < 0.9 ? 2 : 4;
      spawnedTiles.add(getCellKey(row, col));
    }

    function move(direction) {
      if (isAnimating) {
        return;
      }

      const previousBoard = board.map((row) => [...row]);
      spawnedTiles = new Set();
      mergedTiles = new Set();
      const moveResult = runMove(direction);
      board = moveResult.board;
      mergedTiles = moveResult.mergedTiles;

      if (!boardsAreDifferent(previousBoard, board)) {
        spawnedTiles = new Set();
        mergedTiles = new Set();
        settlingTiles = new Set();
        return;
      }

      best = Math.max(best, score);
      localStorage.setItem("best-2048-score", String(best));
      const movingTiles = moveResult.moves.filter((moveItem) => !positionsMatch(moveItem.from, moveItem.to));
      const didMerge = moveResult.mergedTiles.size > 0;
      settlingTiles = new Set(movingTiles.map((moveItem) => getCellKey(...moveItem.to)));

      if (movingTiles.length === 0) {
        settlingTiles = new Set();
        playMoveSound(didMerge);
        addRandomTile();
        turnStartTime = Date.now();
        render();
        evaluateState();
        return;
      }

      isAnimating = true;
      render();
      animateMoves(movingTiles, () => {
        isAnimating = false;
        settlingTiles = new Set();
        playMoveSound(didMerge);
        addRandomTile();
        turnStartTime = Date.now();
        render();
        evaluateState();
      });
    }

    function runMove(direction) {
      const nextBoard = board.map((row) => [...row]);
      const allMoves = [];
      const nextMergedTiles = new Set();

      if (direction === "left") {
        for (let row = 0; row < size; row += 1) {
          const positions = Array.from({ length: size }, (_, col) => [row, col]);
          const result = slideAndMerge(nextBoard[row], positions);
          nextBoard[row] = result.line;
          result.moves.forEach((moveItem) => allMoves.push(moveItem));
          result.mergedTiles.forEach((key) => nextMergedTiles.add(key));
        }
      }

      if (direction === "right") {
        for (let row = 0; row < size; row += 1) {
          const positions = Array.from({ length: size }, (_, offset) => [row, size - 1 - offset]);
          const reversedLine = [...nextBoard[row]].reverse();
          const result = slideAndMerge(reversedLine, positions);
          nextBoard[row] = result.line.reverse();
          result.moves.forEach((moveItem) => allMoves.push(moveItem));
          result.mergedTiles.forEach((key) => nextMergedTiles.add(key));
        }
      }

      if (direction === "up") {
        for (let col = 0; col < size; col += 1) {
          const line = Array.from({ length: size }, (_, row) => nextBoard[row][col]);
          const positions = Array.from({ length: size }, (_, row) => [row, col]);
          const result = slideAndMerge(line, positions);

          for (let row = 0; row < size; row += 1) {
            nextBoard[row][col] = result.line[row];
          }

          result.moves.forEach((moveItem) => allMoves.push(moveItem));
          result.mergedTiles.forEach((key) => nextMergedTiles.add(key));
        }
      }

      if (direction === "down") {
        for (let col = 0; col < size; col += 1) {
          const line = Array.from({ length: size }, (_, row) => nextBoard[size - 1 - row][col]);
          const positions = Array.from({ length: size }, (_, offset) => [size - 1 - offset, col]);
          const result = slideAndMerge(line, positions);
          const orderedLine = result.line.reverse();

          for (let row = 0; row < size; row += 1) {
            nextBoard[row][col] = orderedLine[row];
          }

          result.moves.forEach((moveItem) => allMoves.push(moveItem));
          result.mergedTiles.forEach((key) => nextMergedTiles.add(key));
        }
      }

      return { board: nextBoard, moves: allMoves, mergedTiles: nextMergedTiles };
    }

    function slideAndMerge(line, positions) {
      const values = line
        .map((value, index) => ({ value, from: positions[index] }))
        .filter((cell) => cell.value !== 0);
      const merged = [];
      const moves = [];
      const lineMergedTiles = new Set();

      for (let index = 0; index < values.length; index += 1) {
        const targetPosition = positions[merged.length];

        if (values[index].value === values[index + 1]?.value) {
          const combined = values[index].value * 2;
          merged.push(combined);
          score += combined;
          moves.push({ value: values[index].value, from: values[index].from, to: targetPosition });
          moves.push({ value: values[index + 1].value, from: values[index + 1].from, to: targetPosition });
          lineMergedTiles.add(getCellKey(...targetPosition));
          index += 1;

          if (combined === 2048 && !hasWon) {
            hasWon = true;
            playWinSound();
            showMessage("You Win!", "Nice work. Keep going for a higher score.");
          }
        } else {
          merged.push(values[index].value);
          moves.push({ value: values[index].value, from: values[index].from, to: targetPosition });
        }
      }

      while (merged.length < size) {
        merged.push(0);
      }

      return { line: merged, moves, mergedTiles: lineMergedTiles };
    }

    function boardsAreDifferent(a, b) {
      return a.some((row, rowIndex) =>
        row.some((value, colIndex) => value !== b[rowIndex][colIndex])
      );
    }

    function evaluateState() {
      if (canMove()) {
        return;
      }

      showMessage("Game Over", "No more moves left. Start a new run and beat your best score.");
    }

    function canMove() {
      for (let row = 0; row < size; row += 1) {
        for (let col = 0; col < size; col += 1) {
          const current = board[row][col];

          if (current === 0) {
            return true;
          }

          if (col < size - 1 && current === board[row][col + 1]) {
            return true;
          }

          if (row < size - 1 && current === board[row + 1][col]) {
            return true;
          }
        }
      }

      return false;
    }

    function showMessage(title, text) {
      messageTitleElement.textContent = title;
      messageTextElement.textContent = text;
      overlayElement.classList.add("show");
      gameFinished = title === "Game Over";
      overlaySaveWrap.classList.toggle("show", gameFinished);

      if (gameFinished) {
        overlayPlayerNameInput.value = localStorage.getItem(playerNameStorageKey) || "";
        overlayRankingStatusElement.textContent = "Save this score or start a new run.";
      } else {
        overlayRankingStatusElement.textContent = "";
      }

      updateSaveButtonState();
    }

    function hideMessage() {
      overlayElement.classList.remove("show");
      overlaySaveWrap.classList.remove("show");
      overlayRankingStatusElement.textContent = "";
    }

    function getCellKey(row, col) {
      return `${row}-${col}`;
    }

    function loadTheme() {
      const savedTheme = localStorage.getItem(themeStorageKey) || "classic";
      themeSelect.value = savedTheme;
      applyTheme(savedTheme, false);
    }

    function applyTheme(themeName, persist = true) {
      document.body.dataset.theme = themeName === "classic" ? "" : themeName;

      if (persist) {
        localStorage.setItem(themeStorageKey, themeName);
      }
    }

    function loadSoundPreference() {
      soundEnabled = localStorage.getItem(soundStorageKey) !== "false";
    }

    function startClock() {
      if (clockIntervalId !== null) {
        window.clearInterval(clockIntervalId);
      }

      renderTimers();
      clockIntervalId = window.setInterval(renderTimers, 1000);
    }

    function renderTimers() {
      const now = Date.now();
      const playedSeconds = Math.floor((now - gameStartTime) / 1000);
      const turnSeconds = Math.floor((now - turnStartTime) / 1000);
      timePlayedElement.textContent = `${playedSeconds}s`;
      turnTimeElement.textContent = `${turnSeconds}s`;
    }

    function initRanking() {
      overlayPlayerNameInput.value = localStorage.getItem(playerNameStorageKey) || "";

      if (!rankingApiBase) {
        rankingStatusElement.textContent = "Online ranking API is not configured yet.";
        overlayRankingStatusElement.textContent = "Ranking is offline right now.";
        overlaySaveScoreButton.disabled = true;
        return;
      }

      rankingStatusElement.textContent = "When the game ends, save your score from the popup.";
      loadLeaderboard();
      updateSaveButtonState();
    }

    function handlePlayerNameInput() {
      const displayName = overlayPlayerNameInput.value.trim();
      localStorage.setItem(playerNameStorageKey, displayName);
      updateSaveButtonState();
    }

    function updateSaveButtonState() {
      const hasName = overlayPlayerNameInput.value.trim().length >= 2;
      overlaySaveScoreButton.disabled = !rankingApiBase || !gameFinished || !hasName;
    }

    async function saveScore() {
      const displayName = overlayPlayerNameInput.value.trim();
      if (!rankingApiBase || !gameFinished || displayName.length < 2) {
        return;
      }

      rankingStatusElement.textContent = "Saving score...";
      overlayRankingStatusElement.textContent = "Saving score...";
      overlaySaveScoreButton.disabled = true;

      try {
        const response = await fetch(`${rankingApiBase}/scores`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            playerId: createPlayerId(displayName),
            displayName,
            score
          })
        });

        if (!response.ok) {
          throw new Error("save failed");
        }

        localStorage.setItem(playerNameStorageKey, displayName);
        rankingStatusElement.textContent = "Score saved. Leaderboard updated.";
        overlayRankingStatusElement.textContent = "Saved. You can play again anytime.";
        await loadLeaderboard();
      } catch (error) {
        rankingStatusElement.textContent = "Could not save score. Check the ranking API setup.";
        overlayRankingStatusElement.textContent = "Could not save score right now.";
      } finally {
        updateSaveButtonState();
      }
    }

    async function loadLeaderboard() {
      if (!rankingApiBase) {
        return;
      }

      try {
        const response = await fetch(`${rankingApiBase}/leaderboard?limit=10`);
        if (!response.ok) {
          throw new Error("leaderboard failed");
        }

        const data = await response.json();
        renderLeaderboard(data.entries || []);
      } catch (error) {
        rankingStatusElement.textContent = "Could not load leaderboard.";
      }
    }

    function renderLeaderboard(entries) {
      leaderboardElement.innerHTML = "";

      if (entries.length === 0) {
        const item = document.createElement("li");
        item.textContent = "No scores yet.";
        leaderboardElement.appendChild(item);
        return;
      }

      entries.forEach((entry) => {
        const item = document.createElement("li");
        const name = document.createElement("span");
        const scoreValue = document.createElement("span");
        name.className = "leaderboard-name";
        scoreValue.className = "leaderboard-score";
        name.textContent = entry.displayName;
        scoreValue.textContent = String(entry.bestScore);
        item.append(name, scoreValue);
        leaderboardElement.appendChild(item);
      });
    }

    function createPlayerId(displayName) {
      const normalized = displayName
        .toLowerCase()
        .trim()
        .replace(/\s+/g, "-")
        .replace(/[^a-z0-9가-힣_-]/g, "");
      return `name-${normalized || "guest"}`;
    }

    function attemptAutoplayBgm() {
      ensureAudioReady();
      startBgm();
    }

    function ensureAudioReady() {
      if (!soundEnabled && !bgmEnabled) {
        return;
      }

      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return;
        }

        audioContext = new AudioContextClass();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playTone(frequency, duration, type, volume, delay) {
      const startAt = audioContext.currentTime + delay;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gainNode.gain.setValueAtTime(0.0001, startAt);
      gainNode.gain.exponentialRampToValueAtTime(volume, startAt + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.start(startAt);
      oscillator.stop(startAt + duration + 0.02);
    }

    function playMoveSound(isMerge) {
      if (!soundEnabled) {
        return;
      }

      ensureAudioReady();
      if (!audioContext) {
        return;
      }

      if (isMerge) {
        playTone(540, 0.06, "triangle", 0.048, 0);
        playTone(720, 0.08, "triangle", 0.036, 0.04);
        return;
      }

      playTone(300, 0.035, "square", 0.032, 0);
    }

    function playWinSound() {
      if (!soundEnabled) {
        return;
      }

      ensureAudioReady();
      if (!audioContext) {
        return;
      }

      playTone(660, 0.09, "triangle", 0.044, 0);
      playTone(880, 0.11, "triangle", 0.036, 0.08);
      playTone(1040, 0.13, "triangle", 0.03, 0.16);
    }

    function startBgm() {
      ensureAudioReady();
      if (!audioContext || bgmLoopId !== null) {
        return;
      }

      bgmStep = 0;
      playBgmStep();
      bgmLoopId = window.setInterval(playBgmStep, 420);
    }

    function stopBgm() {
      if (bgmLoopId !== null) {
        window.clearInterval(bgmLoopId);
        bgmLoopId = null;
      }
    }

    function playBgmStep() {
      if (!audioContext) {
        return;
      }

      const pattern = [
        [261.63, 329.63],
        [293.66, 349.23],
        [329.63, 392.0],
        [293.66, 349.23],
        [246.94, 329.63],
        [293.66, 392.0],
        [220.0, 293.66],
        [246.94, 329.63]
      ];

      const [root, top] = pattern[bgmStep % pattern.length];
      playTone(root, 0.34, "sine", 0.11, 0);
      playTone(top, 0.26, "triangle", 0.065, 0.08);
      bgmStep += 1;
    }

    function positionsMatch(a, b) {
      return a[0] === b[0] && a[1] === b[1];
    }

    function animateMoves(moves, onComplete) {
      motionLayerElement.innerHTML = "";
      const cellRects = getCellRects();
      let pendingAnimations = 0;

      for (const moveItem of moves) {
        const fromKey = getCellKey(...moveItem.from);
        const toKey = getCellKey(...moveItem.to);
        const fromRect = cellRects.get(fromKey);
        const toRect = cellRects.get(toKey);

        if (!fromRect || !toRect) {
          continue;
        }

        const movingTile = document.createElement("div");
        movingTile.className = "cell motion-tile";
        movingTile.dataset.value = String(moveItem.value);
        movingTile.textContent = String(moveItem.value);
        movingTile.style.left = `${fromRect.left}px`;
        movingTile.style.top = `${fromRect.top}px`;
        movingTile.style.width = `${fromRect.width}px`;
        movingTile.style.height = `${fromRect.height}px`;
        motionLayerElement.appendChild(movingTile);
        pendingAnimations += 1;

        requestAnimationFrame(() => {
          movingTile.style.transform = `translate(${toRect.left - fromRect.left}px, ${toRect.top - fromRect.top}px)`;
        });

        window.setTimeout(() => {
          movingTile.remove();
          pendingAnimations -= 1;

          if (pendingAnimations === 0) {
            motionLayerElement.innerHTML = "";
            onComplete();
          }
        }, animationDuration + 20);
      }

      if (pendingAnimations === 0) {
        onComplete();
      }
    }

    function getCellRects() {
      const boardRect = boardElement.getBoundingClientRect();
      const rects = new Map();

      Array.from(boardElement.children).forEach((cell, index) => {
        const row = Math.floor(index / size);
        const col = index % size;
        const rect = cell.getBoundingClientRect();

        rects.set(getCellKey(row, col), {
          left: rect.left - boardRect.left,
          top: rect.top - boardRect.top,
          width: rect.width,
          height: rect.height
        });
      });

      return rects;
    }

    init();
  </script>
